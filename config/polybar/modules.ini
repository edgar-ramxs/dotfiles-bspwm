[module/logo_distro]
    type                        = custom/text
    content                     = " "


[module/redes]
    type                        = custom/text
    content                     = " "


[module/openweathermap]
    type                        = custom/script
    exec                        = ~/.config/polybar/menu/weather.sh
    interval                    = 1800


[module/bluetooth]
    type                        = custom/script
    exec                        = ~/.config/polybar/menu/bluetooth.sh
    content                     = "󰂯 "
    interval                    = 2
    format-padding              = 1


[module/workspaces]
    type                        = internal/xworkspaces
    pin-workspaces              = true
    enable-click                = true
    enable-scroll               = true
    icon-0                      = 1
    icon-1                      = 2
    icon-2                      = 3
    icon-3                      = 4
    icon-4                      = 5
    format                      = <label-state>
    format-padding              = 0
    label-active                = " 󰮯 "
    label-active-foreground     = ${theme.workspaces-icon-active}
    label-active-background     = ${theme.background}
    label-occupied              = " 󰊠 "
    label-occupied-foreground   = ${theme.workspaces-icon-occupied}
    label-occupied-background   = ${theme.background}
    label-urgent                = "%icon%"
    label-urgent-foreground     = ${theme.workspaces-icon-active}
    label-urgent-background     = ${theme.background}
    label-empty                 = " 󰊠 "
    label-empty-foreground      = ${theme.workspaces-icon}
    label-empty-background      = ${theme.background}


[module/network]
    type                        = internal/network
    interval                    = 1.0
    interface                   = wlan0
    unknown-as-up               = true
    accumulate-stats            = true
    label-connected             = " 󰖩 "
    format-connected            = <label-connected>
    format-connected-foreground = ${theme.foreground}
    label-disconnected          = " 󰖪 "
    format-disconnected         = <label-disconnected>
    format-disconnected-foreground = ${theme.gray}


[module/date]
    type                        = internal/date
    interval                    = 1.0
    time                        = %k:%M
    date                        = %b %e
    format                      = <label>
    format-foreground           = ${theme.foreground}
    label                       = %date% | %time% 
    label-font                  = 6


[module/battery]
    type                        = internal/battery
    full-at                     = 99
    low-at                      = 20
    battery                     = BAT0
    adapter                     = ADP1
    poll-interval               = 5
    time-format                 = %H:%M
    format-charging             = <animation-charging> <label-charging>
    format-discharging          = <ramp-capacity> <label-discharging>
    label-charging              = %percentage%%
    label-discharging           = %percentage%%
    label-full                  = %percentage%%
    label-low                   = %percentage%%
    ramp-capacity-0             = 
    ramp-capacity-1             = 
    ramp-capacity-2             = 
    ramp-capacity-3             = 
    ramp-capacity-4             = 
    bar-capacity-width          = 10
    animation-charging-0        = 
    animation-charging-1        = 
    animation-charging-2        = 
    animation-charging-3        = 
    animation-charging-4        = 
    animation-charging-framerate = 750
    animation-discharging-0     = 
    animation-discharging-1     = 
    animation-discharging-2     = 
    animation-discharging-3     = 
    animation-discharging-4     = 
    animation-discharging-framerate = 500
    animation-low-0             = !
    animation-low-1             = 
    animation-low-framerate     = 200


[module/pulseaudio]
    type                        = internal/pulseaudio
    interval                    = 5
    use-ui-max                  = true
    reverse-scroll              = false
    format-volume               = <ramp-volume> <label-volume>
    format-muted                = <label-muted>
    label-volume                = %percentage%%
    label-muted                 = 󰝟 Muted
    label-muted-foreground      = ${theme.foreground}
    ramp-volume-0               = 
    ramp-volume-1               = 
    ramp-volume-2               = 


[module/backlight]
    type                        = internal/backlight
    card                        = intel_backlight
    format                      = <ramp> <label>
    format-background           = ${theme.background}
    format-foreground           = ${theme.foreground}
    format-padding              = 1
    label                       = %percentage%%
    ramp-0                      = 󰃜
    ramp-1                      = 󰃛
    ramp-2                      = 󰃚
    ramp-3                      = 󰃠


include-file                = ~/.config/polybar/colors.ini
include-file                = ~/.config/polybar/modules.ini


[global/wm]
    margin-top              = 0
    margin-bottom           = 0


[configuracion-global]
    wm-restack              = bspwm
    fixed-center            = true
    monitor-strict          = false
    bottom                  = false
    height                  = 3%
    offset-y                = 1.5%
    background              = ${theme.background}
    foreground              = ${theme.foreground}
    border-color            = ${theme.background}
    border-size             = 0 
    module-margin-left      = 2
    module-margin-right     = 2
    radius-top              = 10
    radius-bottom           = 10
    font-0                  = "Iosevka Nerd Font:style=Bold:size=12;4"
    font-1                  = "Iosevka Nerd Font:style=Bold:size=14;4"
    font-2                  = "Iosevka Nerd Font:style=Bold:size=16;4"
    font-3                  = "Iosevka Nerd Font:style=Bold:size=20;4"


[bar/barra-escritorios]
    inherit                 = configuracion-global
    width                   = 26%
    offset-x                = 1%
    modules-center          = power workspaces title
    module-margin-left      = 3
    module-margin-right     = 3


[bar/barra-actualidad]
    inherit                 = configuracion-global
    width                   = 20%
    offset-x                = 28%
    modules-center          = openweathermap date clock 


[bar/barra-metricas]
    inherit                 = configuracion-global
    width                   = 29%
    offset-x                = 49%
    modules-center          = filesystem pulseaudio memory cpu packages backlight ;battery


[bar/barra-aplicaciones]
    inherit                 = configuracion-global
    width                   = 20%
    offset-x                = 79%
    modules-center          = notifications apps bluetooth screenshot mpd links htb-networks networks
    module-margin-left      = 2
    module-margin-right     = 2


[settings]
    throttle-output         = 5
    throttle-input-for      = 30
    throttle-output-for     = 10
    screenchange-reload     = false
    compositing-border      = over
    compositing-overline    = over
    compositing-underline   = over
    compositing-background  = source
    compositing-foreground  = over
    format-foreground       = 
    format-background       =
    format-underline        =
    format-overline         =
    format-spacing          =
    format-padding          =
    format-margin           =
    format-offset           =
    pseudo-transparency     = false
